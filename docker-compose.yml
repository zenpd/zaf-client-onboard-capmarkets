version: "3.9"

services:
  backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: capmarkets-onboarding-api:latest
    container_name: capmarkets-api
    ports:
      - "8001:8001"
    environment:
      APP_ENV: ${APP_ENV:-development}
      SECRET_KEY: ${SECRET_KEY:-dev-secret}
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/capmarkets
      REDIS_URL: redis://redis:6379/0
      TEMPORAL_HOST: temporal:7233
      TEMPORAL_NAMESPACE: capmarkets-onboarding
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4o-mini}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-02-15-preview}
      OCR_CONFIDENCE_THRESHOLD: "0.85"
      LLM_CONFIDENCE_THRESHOLD: "0.75"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./app/ui
      dockerfile: Dockerfile
    image: capmarkets-onboarding-ui:latest
    container_name: capmarkets-ui
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: capmarkets-db
    environment:
      POSTGRES_DB: capmarkets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: capmarkets-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.24
    container_name: capmarkets-temporal
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: db
    ports:
      - "7233:7233"
    depends_on:
      db:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: capmarkets-temporal-ui
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8080:8080"
    depends_on:
      - temporal

volumes:
  pgdata:
